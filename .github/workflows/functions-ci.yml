name: Functions CI

on:
  pull_request:
    paths:
      - ".github/workflows/functions-ci.yml"
      - "functions/**"
      - "firebase.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/functions-ci.yml"
      - "functions/**"
      - "firebase.json"
  workflow_dispatch:

concurrency:
  group: functions-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-functions:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify function syntax
        run: node --check index.js

      - name: Load function module
        run: node -e "require('./index.js'); console.log('functions-module-ok')"
